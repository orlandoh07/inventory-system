{% extends "base.html" %}
{% block content %}

<h1>Inventory</h1>

<form method="GET" action="/search">
    <input type="text" name="term">
    <button type="submit">Search</button>
</form>

{% for product in products %}
<p>{{ product[1] }}</p> <!-- name -->
<p>{{ product[2] }}</p> <!-- price -->
<p>{{ product[3] }}</p> <!-- quantity -->
<p>{{ product[4] }}</p> <!-- category_id -->
<a href="{{url_for('update', id=product[0])}}">Edit</a>
<a href="{{url_for('delete', id=product[0])}}">Delete</a>
{% endfor %}

{% endblock %}
