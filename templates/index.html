{% extends "base.html" %}
{% block content %}

<h1>Inventory</h1>

<form method="GET" action="/search">
    <input type="text" name="term">
    <button type="submit" class="btn btn-primary">Search</button>
</form>

{% for product in products %}
<div class="card">
    <p>{{ product[1] }}</p> <!-- name -->
    <p>{{ product[2] }}</p> <!-- price -->
    <p>{{ product[3] }}</p> <!-- quantity -->
    <p>{{ product[4] }}</p> <!-- category_id -->
</div>
<a class="btn btn-edit" href="{{url_for('update', id=product[0])}}">Edit</a>
<a class="btn btn-delete" href="{{ url_for('delete', id=product[0]) }}" 
   onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
{% endfor %}

{% endblock %}
