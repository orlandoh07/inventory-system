{% extends "base.html" %}
{% block content %}

<h1>Login</h1>

<form method="POST">
    <label>Username</label>
    <input type="text" name="username">
    
    <label>Password</label>
    <input type="password" name="password">
    <button class="btn btn-primary">Login</button>
</form>

{% if error %}
    <p>{{ error }}</p>
{% endif %}

{% endblock %}
